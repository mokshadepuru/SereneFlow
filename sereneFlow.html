<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SereneFlow - Study Sanctuary</title>
    <style>
        /* --- CORE STYLES & THEME (CO-1, CO-2) --- */
        :root {
            --primary-bg: #F8F5E4;
            --accent-sage: #ADC2A9;
            --text-primary: #435334;
            --glass-bg: rgba(248, 245, 228, 0.7);
            --glass-border: rgba(153, 167, 153, 0.3);
            --danger-red: #e67e7e;
        }
        [data-theme="dark"] {
            --primary-bg: #1a1a1a;
            --accent-sage: #6b7a69;
            --text-primary: #e0e0e0;
            --glass-bg: rgba(45, 45, 45, 0.7);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--primary-bg); color: var(--text-primary); transition: 0.3s; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; display: none; }

        /* --- LOGIN PAGE STYLES (CO-2) --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-bg); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card {
            background: var(--glass-bg); padding: 3rem; border-radius: 24px;
            border: 1px solid var(--glass-border); text-align: center; width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .login-input, .todo-input {
            width: 100%; padding: 0.8rem; margin: 10px 0; border-radius: 12px;
            border: 1px solid var(--glass-border); box-sizing: border-box; outline: none;
        }

        /* --- DASHBOARD LAYOUT (CO-2: Grid/Flexbox) --- */
        .dashboard-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-sage); padding-bottom: 1rem; }
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid var(--glass-border); padding: 1.5rem; display: flex; flex-direction: column; justify-content: space-between; min-height: 320px;}
        
        .btn { padding: 0.7rem 1.2rem; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent-sage); color: white; width: 100%; margin-top: 10px; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .timer-display { text-align: center; margin: 1rem 0; }
        .timer-input { width: 75px; font-size: 3rem; background: transparent; border: none; color: var(--text-primary); text-align: center; font-weight: bold; }
        
        #progressBarContainer { width: 100%; background: #ddd; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        #progressBar { height: 100%; background: var(--accent-sage); width: 0%; transition: 0.5s ease; }
        
        .intention-item { 
            background: rgba(255,255,255,0.4); margin: 8px 0; padding: 12px; 
            border-radius: 10px; cursor: pointer; transition: 0.2s; border-left: 4px solid var(--accent-sage);
        }
        .completed { text-decoration: line-through; opacity: 0.6; background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h1 style="color: var(--accent-sage); margin-bottom: 0.5rem;">SereneFlow</h1>
        <p style="font-size: 0.9rem; opacity: 0.8;">Enter Sanctuary</p>
        <input type="text" id="username" class="login-input" placeholder="Username (admin)">
        <input type="password" id="password" class="login-input" placeholder="Password (1234)">
        <button onclick="handleLogin()" class="btn btn-primary">Login</button>
        <p id="loginError" style="color: var(--danger-red); font-size: 0.8rem; display: none; margin-top: 10px;">Invalid Credentials</p>
    </div>
</div>

<div class="container" id="mainDashboard">
    <div class="dashboard-header">
        <h1 style="margin: 0;">SereneFlow</h1>
        <div>
            <button onclick="toggleTheme()" class="btn" style="background: var(--glass-border);">Theme</button>
            <button onclick="handleLogout()" class="btn" style="background: var(--danger-red); color: white;">Logout</button>
        </div>
    </div>
    
    <div class="bento-grid">
        <div class="glass-card">
            <small style="text-transform: uppercase; letter-spacing: 1px;">Focus Timer</small>
            <div class="timer-display">
                <input type="number" id="editMins" value="25" class="timer-input">:
                <input type="number" id="editSecs" value="00" class="timer-input">
            </div>
            <button class="btn btn-primary" id="startBtn">Start Session</button>
        </div>

        <div class="glass-card">
            <small style="text-transform: uppercase; letter-spacing: 1px;">Focus Beats</small>
            <iframe 
                style="border-radius:15px; margin-top: 15px;" 
                src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZqd5JicZI0u?utm_source=generator" 
                width="100%" 
                height="100%" 
                frameBorder="0" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <div class="glass-card">
            <small style="text-transform: uppercase; letter-spacing: 1px;">Daily Intentions</small>
            <div style="margin: 10px 0;">
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                    <span>Progress</span>
                    <span id="progressText">0%</span>
                </div>
                <div id="progressBarContainer"><div id="progressBar"></div></div>
            </div>
            <input type="text" id="todoInput" class="todo-input" placeholder="What's your goal?">
            <button id="addBtn" class="btn btn-primary">Add Task</button>
            <ul id="intentionsList" style="padding:0; list-style:none; max-height: 150px; overflow-y: auto; margin-top: 10px;"></ul>
            <button id="clearTasksBtn" style="background:none; border:none; color:var(--danger-red); cursor:pointer; font-size:0.8rem; margin-top:10px;">Clear All Tasks</button>
        </div>
    </div>
</div>

<script>
    /* --- AUTHENTICATION (CO-4 Storage) --- */
    function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === "admin" && p === "1234") {
            sessionStorage.setItem('isLoggedIn', 'true');
            location.reload(); 
        } else { document.getElementById('loginError').style.display = 'block'; }
    }

    function handleLogout() {
        sessionStorage.removeItem('isLoggedIn');
        location.reload();
    }

    // Check login state
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
    }

    /* --- THEME (CO-2 CSS Properties) --- */
    function toggleTheme() {
        document.body.dataset.theme = document.body.dataset.theme === "dark" ? "light" : "dark";
    }

    /* --- TASK LOGIC (CO-4 DOM Manipulation, CO-5 LocalStorage) --- */
    const list = document.getElementById('intentionsList');
    const progBar = document.getElementById('progressBar');
    const progText = document.getElementById('progressText');

    function updateUI() {
        const items = document.querySelectorAll('.intention-item');
        const done = document.querySelectorAll('.completed');
        const p = items.length ? Math.round((done.length / items.length) * 100) : 0;
        progBar.style.width = p + "%";
        progText.innerText = p + "%";
        
        // Save to LocalStorage
        const data = Array.from(items).map(li => ({ text: li.innerText, status: li.classList.contains('completed') }));
        localStorage.setItem('sereneTasks', JSON.stringify(data));
    }

    document.getElementById('addBtn').onclick = () => {
        const val = document.getElementById('todoInput').value;
        if (val) {
            const li = document.createElement('li');
            li.className = 'intention-item';
            li.innerText = val;
            li.onclick = () => { li.classList.toggle('completed'); updateUI(); };
            list.appendChild(li);
            document.getElementById('todoInput').value = "";
            updateUI();
        }
    };

    // --- RESET BUTTON FIX ---
    document.getElementById('clearTasksBtn').onclick = () => {
        if(confirm("Reset all tasks for a fresh start?")) {
            list.innerHTML = ""; // Clear visual list
            localStorage.removeItem('sereneTasks'); // Clear memory
            updateUI(); // Reset bar
        }
    };

    /* --- TIMER LOGIC (CO-3 Functions/Intervals) --- */
    let timeLeft = 25 * 60, timerId = null;
    document.getElementById('startBtn').onclick = function() {
        if(timerId) {
            clearInterval(timerId);
            timerId = null;
            this.innerText = "Start Focus";
        } else {
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--; 
                    document.getElementById('editMins').value = Math.floor(timeLeft/60).toString().padStart(2, '0');
                    document.getElementById('editSecs').value = (timeLeft%60).toString().padStart(2, '0');
                } else {
                    clearInterval(timerId);
                    alert("Focus session complete! Take a break. 🌿");
                }
            }, 1000);
            this.innerText = "Pause";
        }
    };

    /* --- INITIAL LOAD (CO-4) --- */
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('sereneTasks') || "[]");
        saved.forEach(task => {
            const li = document.createElement('li');
            li.className = 'intention-item' + (task.status ? ' completed' : '');
            li.innerText = task.text;
            li.onclick = () => { li.classList.toggle('completed'); updateUI(); };
            list.appendChild(li);
        });
        updateUI();
    };
</script>
</body>
</html>
