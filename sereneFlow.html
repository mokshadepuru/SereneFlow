<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SereneFlow - Study Sanctuary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #F8F5E4;
            --accent-sage: #ADC2A9;
            --accent-moss: #99A799;
            --text-forest: #435334;
            --glass-bg: rgba(248, 245, 228, 0.7);
            --glass-border: rgba(153, 167, 153, 0.3);
            --text-primary: #435334;
            --text-secondary: rgba(67, 83, 52, 0.7);
            --shadow-soft: 0 8px 32px 0 rgba(67, 83, 52, 0.15);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #F8F5E4 0%, #E8E5D4 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            transition: var(--transition-smooth);
        }

        /* TIMER STYLES */
        .timer-display-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
            margin: 1.5rem 0;
        }

        .timer-input {
            width: 90px;
            font-size: 4.5rem;
            font-weight: bold;
            background: transparent;
            border: none;
            color: var(--text-primary);
            text-align: center;
            outline: none;
            font-family: inherit;
        }

        .timer-input:disabled {
            cursor: default;
        }

        .presets {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        /* TO-DO LIST STYLES */
        .input-group {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        #todoInput {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.5);
            outline: none;
        }

        .intentions-list { list-style: none; }
        
        .intention-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            background: rgba(173, 194, 169, 0.1);
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .intention-item.completed .intention-text {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .custom-checkbox {
            width: 24px; height: 24px; border-radius: 8px;
            border: 2px solid var(--accent-moss);
            flex-shrink: 0;
        }

        .completed .custom-checkbox {
            background: var(--accent-moss);
        }

        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            opacity: 0.3;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .delete-btn:hover { opacity: 1; color: #a64d4d; }

        /* BUTTONS */
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--accent-sage); color: white; }
        .btn-outline { background: rgba(173, 194, 169, 0.2); color: var(--text-primary); }
        .btn-small { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn:active { transform: scale(0.95); }

        @media (max-width: 900px) {
            .bento-grid { grid-template-columns: 1fr; }
            .intentions-card { grid-column: span 1 !important; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="bento-grid">
            
            <div class="glass-card timer-card" style="grid-column: span 1;">
                <h2 style="text-align: center;">Focus Timer</h2>
                
                <div class="timer-display-container">
                    <input type="number" id="editMins" value="25" min="0" max="999" class="timer-input">
                    <span style="font-size: 3rem; opacity: 0.5;">:</span>
                    <input type="number" id="editSecs" value="00" min="0" max="59" class="timer-input">
                </div>

                <div class="presets">
                    <button class="btn btn-outline btn-small" onclick="setTimer(25)">25m</button>
                    <button class="btn btn-outline btn-small" onclick="setTimer(5)">5m</button>
                    <button class="btn btn-outline btn-small" onclick="setTimer(15)">15m</button>
                </div>

                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="btn btn-primary" id="startBtn" style="width: 100px;">Start</button>
                    <button class="btn btn-outline" id="resetBtn">Reset</button>
                </div>
            </div>

            <div class="glass-card intentions-card" style="grid-column: span 2;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Daily Intentions</h2>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button id="clearAllBtn" class="btn btn-outline btn-small" style="background: transparent;">Clear All</button>
                        <span id="intentionBadge" style="background: var(--accent-sage); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;">0/0 Complete</span>
                    </div>
                </div>

                <div class="input-group">
                    <input type="text" id="todoInput" placeholder="Add a new goal...">
                    <button id="addBtn" class="btn btn-primary">Add</button>
                </div>

                <ul class="intentions-list" id="intentionsList"></ul>
            </div>

        </div>
    </div>

    <script>
        // --- TIMER LOGIC ---
        let timeLeft = 25 * 60;
        let timerId = null;
        let originalTime = 25 * 60;

        const editMins = document.getElementById('editMins');
        const editSecs = document.getElementById('editSecs');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            editMins.value = mins.toString().padStart(2, '0');
            editSecs.value = secs.toString().padStart(2, '0');
        }

        function setTimer(minutes) {
            clearInterval(timerId);
            timerId = null;
            timeLeft = minutes * 60;
            originalTime = timeLeft;
            startBtn.textContent = "Start";
            unlockInputs();
            updateDisplay();
        }

        function lockInputs() { editMins.disabled = true; editSecs.disabled = true; }
        function unlockInputs() { editMins.disabled = false; editSecs.disabled = false; }

        startBtn.onclick = () => {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                startBtn.textContent = "Start";
                unlockInputs();
            } else {
                const m = parseInt(editMins.value) || 0;
                const s = parseInt(editSecs.value) || 0;
                timeLeft = (m * 60) + s;
                originalTime = timeLeft;
                
                if (timeLeft <= 0) return;
                
                lockInputs();
                startBtn.textContent = "Pause";
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        timerId = null;
                        startBtn.textContent = "Start";
                        unlockInputs();
                        alert("Time for a mindful break! 🌿");
                    }
                }, 1000);
            }
        };

        resetBtn.onclick = () => {
            clearInterval(timerId);
            timerId = null;
            timeLeft = originalTime;
            updateDisplay();
            startBtn.textContent = "Start";
            unlockInputs();
        };

        // --- TO-DO LOGIC ---
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const intentionsList = document.getElementById('intentionsList');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const intentionBadge = document.getElementById('intentionBadge');

        function createTask(text, completed = false) {
            const li = document.createElement('li');
            li.className = `intention-item ${completed ? 'completed' : ''}`;
            li.innerHTML = `<div class="custom-checkbox"></div><span class="intention-text">${text}</span><button class="delete-btn">✕</button>`;
            
            li.onclick = (e) => {
                if (e.target.classList.contains('delete-btn')) return;
                li.classList.toggle('completed');
                save();
            };

            li.querySelector('.delete-btn').onclick = () => {
                li.remove();
                save();
            };
            return li;
        }

        function addTask() {
            if (todoInput.value.trim()) {
                intentionsList.appendChild(createTask(todoInput.value.trim()));
                todoInput.value = "";
                save();
            }
        }

        function save() {
            const tasks = [];
            document.querySelectorAll('.intention-item').forEach(item => {
                tasks.push({ text: item.querySelector('.intention-text').textContent, completed: item.classList.contains('completed') });
            });
            localStorage.setItem('serene_tasks', JSON.stringify(tasks));
            const total = tasks.length;
            const done = tasks.filter(t => t.completed).length;
            intentionBadge.textContent = `${done}/${total} Complete`;
        }

        function load() {
            const saved = JSON.parse(localStorage.getItem('serene_tasks') || '[]');
            saved.forEach(t => intentionsList.appendChild(createTask(t.text, t.completed)));
            save();
        }

        addBtn.onclick = addTask;
        todoInput.onkeypress = (e) => { if (e.key === 'Enter') addTask(); };
        clearAllBtn.onclick = () => { if (confirm("Reset intentions?")) { intentionsList.innerHTML = ""; save(); } };

        window.onload = load;
    </script>
</body>
</html>
